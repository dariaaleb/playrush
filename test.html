<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYRUSH — Premium Loot Box</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
<style>
    :root {
        --black: #050508;
        --card: #0a0a15;
        --cyan: #4dc8e8;
        --pink: #ff0055;
        --white: #ffffff;
    }

    body {
        margin: 0; background: var(--black); font-family: 'Rajdhani', sans-serif;
        color: var(--white); height: 100vh; display: flex; align-items: center; justify-content: center;
    }

    #wheel-overlay {
        position: fixed; inset: 0;
        background: radial-gradient(circle, rgba(13, 13, 24, 0.9) 0%, rgba(5, 5, 8, 1) 100%);
        backdrop-filter: blur(15px);
        display: flex; justify-content: center; align-items: center;
        z-index: 20000;
    }

    .popup-content {
        background: var(--card);
        padding: 30px; border-radius: 30px; text-align: center;
        position: relative; width: 90%; max-width: 400px;
        border: 1px solid rgba(77, 200, 232, 0.3);
        box-shadow: 0 0 50px rgba(0, 0, 0, 1);
    }

    .wheel-box { position: relative; margin-bottom: 20px; width: 100%; display: flex; justify-content: center; }
    
    #wheel { 
        width: 100%; max-width: 320px; height: auto; border-radius: 50%; 
        border: 6px solid #151525;
        transition: transform 5s cubic-bezier(0.15, 0, 0.05, 1);
    }
    
    #marker { 
        position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
        color: var(--pink); font-size: 30px; z-index: 100;
        filter: drop-shadow(0 0 10px var(--pink));
    }

    .spin-btn { 
        background: var(--cyan); color: #000; border: none; width: 100%; padding: 15px; 
        font-weight: 900; font-family: 'Orbitron'; cursor: pointer; 
        border-radius: 10px; text-transform: uppercase; letter-spacing: 1px;
    }

    #wheel-result { 
        margin-top: 20px; display: none; 
        padding: 15px; border: 1px dashed var(--cyan);
    }
    
    .promo-code-display { 
        font-size: 28px; color: var(--white); display: block; 
        font-family: 'Orbitron'; margin-top: 5px;
        text-shadow: 0 0 10px var(--cyan);
    }

    #sparks-canvas {
        position: absolute; inset: 0; pointer-events: none; z-index: 1000;
    }
</style>
</head>
<body>

<div id="wheel-overlay">
    <canvas id="sparks-canvas"></canvas>
    <div class="popup-content">
        <div class="wheel-box">
            <div id="marker">▼</div>
            <canvas id="wheel" width="400" height="400"></canvas>
        </div>
        <h2 id="popup-title" style="font-family: 'Orbitron'; font-size: 18px; color: var(--cyan); margin-bottom: 15px;">LOOT BOX READY</h2>
        
        <input type="email" id="spin-email" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 5px;" placeholder="EMAIL-UL TĂU...">
        
        <button id="spin-start-btn" class="spin-btn">ACTIVATE SPIN</button>

        <div id="wheel-result">
            <p style="font-size: 11px; color: var(--cyan); margin: 0;">ACCESS GRANTED - CODE:</p>
            <span id="promo-code-val" class="promo-code-display">-------</span>
        </div>
    </div>
</div>

<script>
    const LOOT_BOX = {
        "10% OFF": ["RUSH-X99", "RUSH-K22", "RUSH-L55"],
        "20% OFF": ["RUSH-BOSS", "RUSH-GOLD", "RUSH-WIN"]
    };

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const segments = ["10% OFF", "20% OFF", "10% OFF", "20% OFF", "10% OFF", "20% OFF", "JACKPOT", "10% OFF"];
    const colors = ["#080812", "#121225", "#080812", "#121225", "#080812", "#121225", "#4dc8e8", "#080812"];

    // Audio Setup
    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playClick() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    function draw() {
        const arc = (Math.PI * 2) / segments.length;
        for(let i=0; i<segments.length; i++) {
            ctx.beginPath();
            ctx.fillStyle = colors[i];
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 200, i * arc, (i + 1) * arc);
            ctx.fill();
            ctx.strokeStyle = "rgba(77,200,232,0.5)";
            ctx.stroke();
            
            ctx.save();
            ctx.translate(200, 200);
            ctx.rotate(i * arc + arc / 2);
            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            ctx.fillText(segments[i], 100, 10);
            ctx.restore();
        }
    }
    draw();

    let rotation = 0;
    document.getElementById('spin-start-btn').onclick = function() {
        initAudio();
        const email = document.getElementById('spin-email').value;
        if(!email.includes('@')) { alert("Email invalid!"); return; }

        this.disabled = true;
        const extra = 3600 + Math.floor(Math.random() * 360);
        rotation += extra;
        canvas.style.transform = `rotate(${rotation}deg)`;

        // Simulare sunet click
        let timer = 0;
        const interval = setInterval(() => {
            playClick();
            createSparks();
            timer += 100;
            if(timer >= 5000) {
                clearInterval(interval);
                showResult(rotation);
            }
        }, 200);
    };

    function showResult(rot) {
        const actualDeg = rot % 360;
        const idx = Math.floor((360 - (actualDeg % 360)) / (360 / segments.length)) % segments.length;
        const prize = segments[idx];
        const cat = (prize.includes("20") || prize === "JACKPOT") ? "20% OFF" : "10% OFF";
        const code = LOOT_BOX[cat][Math.floor(Math.random() * LOOT_BOX[cat].length)];

        document.getElementById('wheel-result').style.display = "block";
        document.getElementById('promo-code-val').innerText = code;
        document.getElementById('popup-title').innerText = "REWARD UNLOCKED";
    }

    // Sparks
    const sCanvas = document.getElementById('sparks-canvas');
    const sCtx = sCanvas.getContext('2d');
    sCanvas.width = window.innerWidth; sCanvas.height = window.innerHeight;
    let particles = [];

    function createSparks() {
        for(let i=0; i<8; i++) {
            particles.push({
                x: window.innerWidth/2, y: window.innerHeight/2 - 150,
                vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15,
                life: 1.0
            });
        }
    }

    function anim() {
        sCtx.clearRect(0,0,sCanvas.width, sCanvas.height);
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            sCtx.fillStyle = `rgba(77,200,232,${p.life})`;
            sCtx.fillRect(p.x, p.y, 4, 4);
        });
        particles = particles.filter(p => p.life > 0);
        requestAnimationFrame(anim);
    }
    anim();
</script>
</body>
</html>
